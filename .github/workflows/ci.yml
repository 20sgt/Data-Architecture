name: ci

on:
  push:
  pull_request:

jobs:
  parser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"   # the project interpreter (matches .venv); bump in one place if it changes
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest scrape/test_parsers.py -v       # offline parsers only — no network, no browser
